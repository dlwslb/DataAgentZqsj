          username: ${DATA_AGENT_DATASOURCE_USERNAME:root}
          password: ${DATA_AGENT_DATASOURCE_PASSWORD:Daren87087766!}
          driver-class-name: com.mysql.cj.jdbc.Driver
    alibaba:
      data-agent:
        vector-store:
          table-topk-limit: 10
          table-similarity-threshold: 0.2
          default-topk-limit: 8
          default-similarity-threshold: 0.4
        llm-service-type: stream
        code-executor:
          code-pool-executor: local  # 开发环境用本地Python
          python-max-tries-count: 3
        file:
          type: local
          path-prefix: data-agent
          path: uploads
          url-prefix: /uploads
          imageSize: 2097152
        max-sql-retry-count: 3
        langfuse:
          enabled: false

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    org.springframework.jdbc: debug

# 开发环境限流配置（宽松）
app:
  rate-limit:
    enabled: true
    max-requests-per-minute: 60
    llm-paths: /api/v1/chat,/api/scope/agent

# AgentScope 长期记忆配置
agentscope:
  memory:
    enabled: true  # 是否启用长期记忆
    similarity-threshold: 0.4  # 相似度阈值(COSINE距离范围[0,2],降低阈值提高召回率)
    default-topk: 10  # 默认检索数量
    max-topk: 50  # 最大检索数量
    retention-days: 365  # 默认保留天数
    auto-record-threshold: 0.7  # 自动记录重要性阈值
    auto-record-enabled: true  # 是否启用自动记录
    memory-type: semantic  # 默认记忆类型: semantic-语义, episodic-情景, procedural-程序性
    cleanup-cron: "0 0 2 * * ?"  # 清理过期任务 cron 表达式 (每天凌晨2点)
    cleanup-enabled: true  # 是否启用定时清理
    max-content-length: 2000  # 向量存储时最大内容长度(避免token超限)