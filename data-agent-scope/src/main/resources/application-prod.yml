# 生产环境配置 tender_agent
spring:
  datasource:
    url: ${DATA_AGENT_DATASOURCE_URL:jdbc:mysql://172.26.177.96:2881/tender_agent?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DATA_AGENT_DATASOURCE_USERNAME:root}
    password: ${DATA_AGENT_DATASOURCE_PASSWORD:Daren87087766!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      embedding:
        options:
          model: text-embedding-v4  # 使用通义千问的文本嵌入模型
    vectorstore:
      type: oceanbase  # 生产环境用OceanBase向量
      oceanbase:
        initialize-schema: false  # 生产环境不自动初始化
        distance-type: COSINE
        embedding-dimension: 1024  # text-embedding-v3 模型生成 1024 维向量
        index-type: HNSW
        hnsw-m: 16
        hnsw-ef-construction: 64
        table-name: agent_scope_vector_store  # AgentScope向量存储表名
        datasource:
          url: ${DATA_AGENT_DATASOURCE_URL:jdbc:mysql://172.26.177.96:2881/tender_agent?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai}
          username: ${DATA_AGENT_DATASOURCE_USERNAME:root}
          password: ${DATA_AGENT_DATASOURCE_PASSWORD:Daren87087766!}
          driver-class-name: com.mysql.cj.jdbc.Driver
    alibaba:
      data-agent:
        vector-store:
          table-topk-limit: 10
          table-similarity-threshold: 0.2
          default-topk-limit: 8
          default-similarity-threshold: 0.4
        llm-service-type: stream
        code-executor:
          code-pool-executor: docker  # 生产环境用Docker
          host: ${DOCKER_HOST:}  # 远程Docker地址
          python-max-tries-count: 5
        file:
          type: local
          path-prefix: data-agent
          path: uploads
          url-prefix: /uploads
          imageSize: 2097152
          oss:
            access-key-id: ${OSS_ACCESS_KEY_ID:}
            access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
            endpoint: ${OSS_ENDPOINT:}
            bucket-name: ${OSS_BUCKET_NAME:}
            custom-domain: ${OSS_CUSTOM_DOMAIN:}
        max-sql-retry-count: 10
        langfuse:
          enabled: ${LANGFUSE_ENABLED:false}
          host: ${LANGFUSE_HOST:}
          public-key: ${LANGFUSE_PUBLIC_KEY:}
          secret-key: ${LANGFUSE_SECRET_KEY:}

# 生产环境禁用 Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境限流配置
app:
  rate-limit:
    enabled: true
    max-requests-per-minute: 20
    llm-paths: /api/v1/chat,/api/scope/agent

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# AgentScope 长期记忆配置
agentscope:
  memory:
    enabled: true  # 是否启用长期记忆
    similarity-threshold: 0.4  # 相似度阈值
    default-topk: 10  # 默认检索数量
    max-topk: 50  # 最大检索数量
    retention-days: 365  # 默认保留天数
    auto-record-threshold: 0.7  # 自动记录重要性阈值
    auto-record-enabled: true  # 是否启用自动记录
    memory-type: semantic  # 默认记忆类型: semantic-语义, episodic-情景, procedural-程序性
    cleanup-cron: "0 0 3 * * ?"  # 清理过期任务 cron 表达式 (生产环境凌晨3点)
    cleanup-enabled: true  # 是否启用定时清理
    max-content-length: 2000  # 向量存储时最大内容长度(避免token超限)
  # A2A Protocol A2A 协议
  a2a:
    remote-agent-url: http://172.26.177.96:58065
    remote-agent-id: "5"

logging:
  level:
    root: WARN
    com.jldaren.agent.ai.datascope: info
    io.agentscope: WARN